<!DOCTYPE html>
<html id="html-root">
<head>
  <title>Media Pembelajaran</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-100 dark:bg-gray-900 dark:text-white" id="body">

  <div class="flex justify-end p-4">
    <button onclick="toggleDark()" class="bg-gray-800 text-white px-4 py-2 rounded">
      Toggle Dark Mode
    </button>
  </div>

  <h1 class="text-3xl font-bold text-center mt-5">
    Belajar Algoritma
  </h1>

  <div class="p-5">
    <p>Algoritma adalah langkah-langkah penyelesaian masalah.</p>
  </div>

  <script>
    function toggleDark() {
      document.documentElement.classList.toggle('dark');
    }
  </script>

</body>
</html>
